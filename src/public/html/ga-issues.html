<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Issue Tracker - OSMS Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4facfe;
      --secondary: #00f2fe;
      --bg-dark: #070b14;
      --card-bg: rgba(30, 41, 59, 0.4);
      --neon-red: #ff3131;
      --neon-orange: #ff9f43;
      --neon-blue: #00d2ff;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      background-image:
        radial-gradient(circle at 100% 0%, rgba(255, 49, 49, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 0% 100%, rgba(79, 172, 254, 0.05) 0%, transparent 40%);
      min-height: 100vh;
      color: white;
      overflow-x: hidden;
    }

    .navbar-glass {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* 3D Table Container */
    .issue-container {
      background: var(--card-bg);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 30px;
      padding: 2.5rem;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
      margin-top: 2rem;
    }

    .cyber-table {
      color: white !important;
      border-collapse: separate;
      border-spacing: 0 12px;
    }

    .cyber-table thead th {
      border: none;
      color: var(--primary);
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 2px;
      padding: 15px 20px;
    }

    .cyber-table tbody tr {
      background: rgba(15, 23, 42, 0.6);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .cyber-table tbody tr:hover {
      transform: scale(1.015) translateY(-5px);
      background: rgba(79, 172, 254, 0.1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 49, 49, 0.2);
    }

    .cyber-table td {
      padding: 20px !important;
      border: none !important;
      vertical-align: middle;
      font-size: 0.9rem;
    }

    .cyber-table td:first-child {
      border-radius: 15px 0 0 15px;
      font-weight: 700;
      color: var(--secondary);
    }

    .cyber-table td:last-child {
      border-radius: 0 15px 15px 0;
    }

    /* Issue Status Badges */
    .badge-issue {
      padding: 6px 14px;
      border-radius: 8px;
      font-weight: 800;
      text-transform: uppercase;
      font-size: 0.7rem;
      border: 1px solid transparent;
    }

    .status-open {
      background: rgba(255, 49, 49, 0.1);
      color: var(--neon-red);
      border-color: var(--neon-red);
      box-shadow: 0 0 10px rgba(255, 49, 49, 0.2);
    }

    .status-resolved {
      background: rgba(0, 255, 136, 0.1);
      color: #00ff88;
      border-color: #00ff88;
    }

    .id-tag {
      background: rgba(255, 255, 255, 0.05);
      padding: 3px 8px;
      border-radius: 5px;
      font-family: monospace;
      color: #94a3b8;
    }

    .brand-glow {
      font-weight: 800;
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-glass py-3">
    <div class="container">
      <span class="navbar-brand brand-glow fs-4">OSMS <span class="text-danger">ISSUES</span></span>
      <div class="ms-auto">
        <a class="btn btn-outline-info btn-sm rounded-pill px-4 me-2" href="/html/ga-dashboard.html">Admin Console</a>
        <button class="btn btn-danger btn-sm rounded-pill px-4" id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="mb-5 d-flex align-items-center">
      <div class="bg-danger p-3 rounded-4 me-3 shadow-lg" style="--bs-bg-opacity: 0.2;">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#ff3131" viewBox="0 0 16 16">
          <path
            d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2zm.995-14.901a1 1 0 1 0-1.99 0A5.002 5.002 0 0 0 3 6c0 1.098-.5 6-2 7h14c-1.5-1-2-5.902-2-7 0-2.42-1.72-4.44-4.005-4.901z" />
        </svg>
      </div>
      <div>
        <h2 class="fw-800 mb-0">Discrepancy Log</h2>
        <p class="text-white-50 small">Track and resolve logistical bottlenecks and supply errors</p>
      </div>
    </div>

    <div class="issue-container">
      <div class="table-responsive">
        <table class="table cyber-table">
          <thead>
            <tr>
              <th>Ticket ID</th>
              <th>Reference</th>
              <th>Issue Title</th>
              <th>Brief Description</th>
              <th class="text-center">Status</th>
              <th>Operator</th>
            </tr>
          </thead>
          <tbody id="issuesTable">
            <tr>
              <td>#ISS-882</td>
              <td><span class="id-tag">REQ-990</span></td>
              <td class="fw-bold text-white">Wrong Quantity Delivered</td>
              <td class="text-white-50">Requested 50, but received 5 rims of paper.</td>
              <td class="text-center"><span class="badge-issue status-open">UNRESOLVED</span></td>
              <td>
                <div class="small fw-bold">Ganesh Dutt</div>
                <div class="small text-white-50">IT-Software</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/logout.js"></script>
  <script src="/js/ga-issues.js"></script>

</body>

</html>
