<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>New Request - OSMS Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4facfe;
      --secondary: #00f2fe;
      --bg-dark: #070b14;
      --card-bg: rgba(30, 41, 59, 0.6);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at 0% 0%, rgba(79, 172, 254, 0.1) 0%, transparent 40%);
      min-height: 100vh;
      color: white;
    }

    /* Glass Navbar */
    .navbar-glass {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .request-container {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      padding: 3rem;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      margin-top: 2rem;
    }

    .brand-text {
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    /* 3D Dynamic Rows */
    .item-row {
      background: rgba(15, 23, 42, 0.5);
      padding: 20px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 15px;
      transition: all 0.3s ease;
      animation: slideIn 0.4s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .form-control {
      background: #0f172a !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: white !important;
      border-radius: 12px !important;
      padding: 12px !important;
      box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.5) !important;
    }

    .form-control:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 15px rgba(79, 172, 254, 0.3) !important;
    }

    /* Action Buttons */
    .btn-add {
      background: rgba(79, 172, 254, 0.1);
      border: 1px dashed var(--primary);
      color: var(--primary);
      border-radius: 12px;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-add:hover {
      background: var(--primary);
      color: #000;
      box-shadow: 0 0 20px rgba(79, 172, 254, 0.4);
    }

    .btn-submit {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      color: #000;
      font-weight: 800;
      padding: 15px;
      border-radius: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4);
    }

    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(79, 172, 254, 0.6);
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-glass py-3">
    <div class="container">
      <span class="navbar-brand brand-text fs-4">OSMS <span class="text-info">REQUEST</span></span>
      <div class="ms-auto">
        <a class="btn btn-outline-light btn-sm rounded-pill px-3 me-2" href="/html/dept-dashboard.html">← Back to
          Dashboard</a>
        <button class="btn btn-danger btn-sm rounded-pill px-3" id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>



  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-9">

        <div class="request-container">
          <div class="d-flex align-items-center mb-5">
            <div class="bg-primary p-3 rounded-4 me-3 shadow-lg">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="white" viewBox="0 0 16 16">
                <path
                  d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z" />
                <path fill-rule="evenodd"
                  d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5v11z" />
              </svg>
            </div>
            <div>
              <h2 class="mb-0 fw-800">New Supply Ticket</h2>
              <p class="text-white-50 mb-0 small">Add items from the catalog to your request list</p>
            </div>
          </div>

          <form id="requestForm">
            <div id="itemsContainer">
              <div class="item-row">
                <div class="row g-3 align-items-end">
                  <div class="col-md-7">
                    <label class="form-label small text-white-50 fw-bold uppercase">Supply Item ID / Name</label>
                    <input type="text" class="form-control" placeholder="E.g. ITEM-402" name="item_id" required>
                  </div>
                  <div class="col-md-5">
                    <label class="form-label small text-white-50 fw-bold uppercase">Requested Qty</label>
                    <input type="number" class="form-control" placeholder="00" name="quantity" min="1" required>
                  </div>
                </div>
              </div>
            </div>

            <div class="d-flex flex-column flex-md-row gap-3 mt-4">
              <button type="button" class="btn btn-add flex-grow-1 p-3" id="addItemBtn">
                <span class="fs-5 me-2">+</span> Add Another Item
              </button>
              <button type="submit" class="btn btn-submit flex-grow-1 p-3">
                Finalize & Submit Request
              </button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/logout.js"></script>
  <script src="/js/dept-request.js"></script>

</body>

</html>
