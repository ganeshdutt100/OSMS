<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>New Request - Office Supplies Management System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom styles -->
  <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar bg-white shadow-sm">
  <div class="container">
    <span class="navbar-brand">Office Supplies Management System</span>
    <div class="ms-auto">
      <a class="btn btn-outline-dark" href="/html/dept-dashboard.html">Dashboard</a>
      <button class="btn btn-danger ms-2" id="logoutBtn">Logout</button>
    </div>
  </div>
</nav>

<!-- Main Content -->
<div class="container py-4">
  <h2 class="mb-4">Submit New Request</h2>
  <form id="requestForm">
    <div id="itemsContainer">
      <div class="row mb-3">
        <div class="col-md-5">
          <input type="text" class="form-control" placeholder="Item ID" name="item_id" required>
        </div>
        <div class="col-md-5">
          <input type="number" class="form-control" placeholder="Quantity" name="quantity" min="1" required>
        </div>
      </div>
    </div>
    <button type="button" class="btn btn-secondary mb-3" id="addItemBtn">Add Another Item</button>
    <button type="submit" class="btn btn-primary">Submit Request</button>
  </form>
</div>

<!-- Scripts -->
<script src="/js/app.js"></script>
<script src="/js/logout.js"></script>
<script src="/js/dept-request.js"></script>
</body>
</html>
