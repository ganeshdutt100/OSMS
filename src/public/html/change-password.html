<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Change Password - Office Supplies Management System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom styles -->
  <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar bg-white">
  <div class="container">
    <span class="navbar-brand">Office Supplies Management System</span>
    <div class="ms-auto">
      <!-- Dashboard link corrected to /html/... -->
      <a class="btn btn-outline-dark" href="/html/dept-dashboard.html">Dashboard</a>
      <button class="btn btn-danger ms-2" id="logoutBtn">Logout</button>
    </div>
  </div>
</nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4 shadow-sm">
        <h3 class="mb-3">Change Password</h3>
        <form id="changePasswordForm">
          <div class="mb-3">
            <label for="currentPassword" class="form-label">Current Password</label>
            <input id="currentPassword" name="currentPassword" type="password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label for="newPassword" class="form-label">New Password</label>
            <input id="newPassword" name="newPassword" type="password" class="form-control" required>
          </div>
          <button class="btn btn-primary w-100" type="submit">Change Password</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="/js/app.js"></script>
<script src="/js/logout.js"></script>
<script src="/js/change-password.js"></script>
</body>
</html>
