<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Security - OSMS Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4facfe;
      --secondary: #00f2fe;
      --bg-dark: #070b14;
      --card-bg: rgba(30, 41, 59, 0.6);
      --danger: #ef4444;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      background-image:
        radial-gradient(circle at 50% 50%, rgba(79, 172, 254, 0.05) 0%, transparent 50%);
      min-height: 100vh;
      color: white;
      display: flex;
      flex-direction: column;
    }

    .navbar-glass {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Security Card Styling */
    .security-card {
      background: var(--card-bg);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 35px;
      padding: 3.5rem;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
      transform-style: preserve-3d;
      transition: all 0.3s ease;
    }

    .shield-icon {
      width: 80px;
      height: 80px;
      background: rgba(79, 172, 254, 0.1);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      border: 1px solid rgba(79, 172, 254, 0.3);
      box-shadow: 0 0 20px rgba(79, 172, 254, 0.2);
    }

    /* 3D Inputs */
    .form-control {
      background: #0f172a !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: white !important;
      border-radius: 15px !important;
      padding: 14px 20px !important;
      box-shadow: inset 4px 4px 10px rgba(0, 0, 0, 0.4) !important;
      transition: 0.3s;
    }

    .form-control:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 15px rgba(79, 172, 254, 0.3), inset 4px 4px 10px rgba(0, 0, 0, 0.4) !important;
    }

    .btn-update {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      color: #070b14;
      font-weight: 800;
      padding: 15px;
      border-radius: 15px;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4);
      margin-top: 1rem;
    }

    .btn-update:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 15px 35px rgba(79, 172, 254, 0.6);
    }

    .brand-text-glow {
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    input::placeholder {
      color: gray !important;
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-glass py-3">
    <div class="container">
      <span class="navbar-brand brand-text-glow fs-4">OSMS <span class="text-info">SECURE</span></span>
      <div class="ms-auto">
        <a class="btn btn-outline-info btn-sm rounded-pill px-4 me-2" href="/html/dept-dashboard.html">Dashboard</a>
        <button class="btn btn-danger btn-sm rounded-pill px-4" id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="row w-100 justify-content-center">
      <div class="col-lg-5 col-md-8">

        <div class="security-card" data-tilt data-tilt-max="8">
          <div class="shield-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="#4facfe" viewBox="0 0 16 16">
              <path
                d="M8 .5c-.683 0-1.315.28-1.716.714C5.88 1.647 5.232 2.344 4.8 3.328a11.37 11.37 0 0 0-.71 4.544c0 1.136.096 2.46.714 3.45.18.289.372.534.588.739.215.204.455.373.714.496.257.123.541.215.842.274.302.06.634.092.98.092.347 0 .68-.033.98-.092.302-.06.585-.15.843-.274.258-.123.498-.292.713-.496.216-.205.408-.45.589-.74.617-.99.713-2.313.713-3.449 0-1.426-.245-2.822-.71-4.544-.432-.984-1.08-1.681-1.716-2.114A2.63 2.63 0 0 0 8 .5zM6.57 6.46c.14-.594.33-1.064.545-1.434.214-.371.454-.63.714-.77.258-.14.53-.21.821-.21s.563.07.821.21c.26.14.5.399.714.77.215.37.405.84.545 1.433.14.595.21 1.23.21 1.903 0 .674-.07 1.309-.21 1.903-.14.595-.33 1.064-.545 1.434-.214.37-.454.63-.714.771-.258.14-.53.21-.821.21s-.563-.07-.821-.21c-.26-.14-.5-.399-.714-.77a4.938 4.938 0 0 1-.545-1.434c-.14-.594-.21-1.23-.21-1.903 0-.673.07-1.308.21-1.903z" />
            </svg>
          </div>

          <div class="text-center mb-5">
            <h3 class="fw-800 mb-1">Update Security Key</h3>
            <p class="text-white-50 small">Enter your current and new credentials</p>
          </div>

          <form id="changePasswordForm">
            <div class="mb-4">
              <label class="form-label small fw-bold text-white-50 text-uppercase tracking-wider">Authentication
                Check</label>
              <input id="currentPassword" name="currentPassword" type="password" class="form-control"
                placeholder="Current Security Key" required>
            </div>

            <div class="mb-4">
              <label class="form-label small fw-bold text-white-50 text-uppercase tracking-wider">New Security
                Key</label>
              <input id="newPassword" name="newPassword" type="password" class="form-control"
                placeholder="New Security Key" required>
            </div>

            <button class="btn btn-update w-100 mt-2" type="submit">Update Vault Key</button>
          </form>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/logout.js"></script>
  <script src="/js/change-password.js"></script>

  <script>
    VanillaTilt.init(document.querySelectorAll(".security-card"), {
      max: 8,
      speed: 400,
      glare: true,
      "max-glare": 0.2,
      scale: 1.01
    });
  </script>

</body>

</html>
