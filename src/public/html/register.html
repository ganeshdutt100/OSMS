<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Register - OSMS Pro 3D</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
  <link href="/css/styles.css" rel="stylesheet">

  <style>
    /* Global Background merge with Login Theme */
    body {
      font-family: 'Outfit', sans-serif;
      background-color: #070b14;
      background-image:
        radial-gradient(circle at 90% 10%, rgba(79, 172, 254, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 10% 90%, rgba(0, 242, 254, 0.1) 0%, transparent 40%);
      min-height: 100vh;
      color: white;
      display: flex;
      align-items: center;
      overflow-x: hidden;
    }

    .register-card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 35px;
      padding: 2.5rem;
      box-shadow: 20px 20px 60px rgba(0, 0, 0, 0.4);
      transform-style: preserve-3d;
    }

    .brand-text {
      font-weight: 800;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* 3D Inputs */
    .form-control,
    .form-select {
      background: rgba(15, 23, 42, 0.8) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      border-radius: 12px !important;
      color: white !important;
      padding: 10px 15px !important;
      box-shadow: inset 2px 2px 8px rgba(0, 0, 0, 0.4) !important;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: #4facfe !important;
      box-shadow: 0 0 15px rgba(79, 172, 254, 0.2), inset 2px 2px 8px rgba(0, 0, 0, 0.4) !important;
    }

    .btn-register {
      background: linear-gradient(135deg, #00b09b, #96c93d);
      /* Success theme modern twist */
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-weight: 800;
      color: #070b14;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px rgba(150, 201, 61, 0.3);
    }

    .btn-register:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 15px 30px rgba(150, 201, 61, 0.5);
    }

    /* Floating Side SVG */
    .side-svg {
      animation: floatMove 6s ease-in-out infinite;
      filter: drop-shadow(0 20px 40px rgba(79, 172, 254, 0.2));
    }

    input::placeholder {
      color: rgb(75, 73, 73) !important;
    }

    @keyframes floatMove {

      0%,
      100% {
        transform: translateY(0px) rotate(0deg);
      }

      50% {
        transform: translateY(-25px) rotate(2deg);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="row align-items-center justify-content-center min-vh-100 py-5">

      <div class="col-lg-5 d-none d-lg-block text-center pe-lg-5">
        <h1 class="display-4 fw-800 mb-4 brand-text">Join the Future</h1>
        <p class="text-white-50 mb-5">Create an account to streamline your office workflow and supply chain management.
        </p>
        <div class="side-svg">
          <svg viewBox="0 0 790 563" xmlns="http://www.w3.org/2000/svg">
            <circle cx="395" cy="281" r="200" fill="rgba(79, 172, 254, 0.05)" />
            <path d="M400 100 L500 300 L300 300 Z" fill="#4facfe" opacity="0.6" />
          </svg>
        </div>
      </div>

      <div class="col-lg-6 col-md-10">
        <div class="register-card" data-tilt data-tilt-max="5">
          <div class="text-center mb-4">
            <h3 class="fw-800 mb-1">Create Operator</h3>
            <p class="text-white-50 small">Fill in the details to register in OSMS Pro</p>
          </div>

          <form id="registerForm" class="row g-3">
            <div class="col-md-6">
              <label class="form-label small fw-bold text-white-50">User ID</label>
              <input id="user_id" name="user_id" type="text" class="form-control" maxlength="10" placeholder="EMP12345"
                required>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold text-white-50">Full Name</label>
              <input id="name" name="name" type="text" class="form-control" placeholder="Ganesh Dutt" required>
            </div>

            <div class="col-md-4">
              <label class="form-label small fw-bold text-white-50">Dept ID</label>
              <input id="dept_id" name="dept_id" type="text" class="form-control" maxlength="4" placeholder="IT01"
                required>
            </div>
            <div class="col-md-8">
              <label class="form-label small fw-bold text-white-50">Corporate Email</label>
              <input id="email" name="email" type="email" class="form-control" placeholder="gd@company.com" required>
            </div>

            <div class="col-12">
              <label class="form-label small fw-bold text-white-50">Security Password</label>
              <input id="password" name="password" type="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="col-12">
              <label class="form-label small fw-bold text-white-50">Access Level (Role)</label>
              <select id="role" name="role" class="form-select" required>
                <option value="" disabled selected>Choose responsibility...</option>
                <option value="STAFF">Department Staff</option>
                <option value="GA">General Admin</option>
                <option value="ADMIN">System Administrator</option>
              </select>
            </div>

            <div class="col-12 mt-4">
              <button class="btn-register w-100 shadow-lg" type="submit">Initialize Registration</button>
            </div>
          </form>

          <p class="mt-4 text-center text-white-50 small">
            Already verified? <a href="/html/login.html"
              style="color: #4facfe; font-weight: 700; text-decoration: none;">Secure Login →</a>
          </p>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/register.js"></script>
  <script>
    VanillaTilt.init(document.querySelectorAll(".register-card"), {
      max: 5,
      speed: 400,
      glare: true,
      "max-glare": 0.1,
    });
  </script>
</body>

</html>
