<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Register - Office Supplies Management System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom styles -->
  <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card p-4 shadow-sm">
        <h3 class="mb-3 text-center">Register</h3>
        <form id="registerForm">
          <!-- User ID -->
          <div class="mb-3">
            <label for="user_id" class="form-label">User ID</label>
            <input id="user_id" name="user_id" type="text" class="form-control" maxlength="10" required>
          </div>
          <!-- Full Name -->
          <div class="mb-3">
            <label for="name" class="form-label">Full Name</label>
            <input id="name" name="name" type="text" class="form-control" required>
          </div>
          <!-- Department ID -->
          <div class="mb-3">
            <label for="dept_id" class="form-label">Department ID</label>
            <input id="dept_id" name="dept_id" type="text" class="form-control" maxlength="4" required>
          </div>
          <!-- Email -->
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input id="email" name="email" type="email" class="form-control" required>
          </div>
          <!-- Password -->
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input id="password" name="password" type="password" class="form-control" required>
          </div>
          <!-- Role -->
          <div class="mb-3">
            <label for="role" class="form-label">Role</label>
            <select id="role" name="role" class="form-select" required>
              <option value="">Select role</option>
              <option value="STAFF">Department Staff</option>
              <option value="GA">General Admin</option>
              <option value="ADMIN">Administrator</option>
            </select>
          </div>
          <!-- Submit -->
          <button class="btn btn-success w-100" type="submit">Register</button>
        </form>
        <p class="mt-3 text-center">
          Already have an account? <a href="/html/login.html">Login here</a>
        </p>
      </div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="/js/app.js"></script>
<script src="/js/register.js"></script>
</body>
</html>
