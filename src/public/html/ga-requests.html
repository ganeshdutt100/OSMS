<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Review Requests - OSMS Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4facfe;
      --bg-dark: #070b14;
      --success: #22c55e;
      --danger: #ef4444;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      /* Background mein wahi theme rakhi hai continuity ke liye */
      background-image: radial-gradient(circle at 100% 0%, rgba(79, 172, 254, 0.1) 0%, transparent 30%);
      min-height: 100vh;
      color: white;
    }

    .navbar-glass {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Clean White Table Styling */
    .table-card {
      background: #ffffff;
      /* White table container */
      border-radius: 25px;
      padding: 1.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }

    .custom-table {
      margin-bottom: 0;
      border-collapse: separate;
      border-spacing: 0 12px;
      /* Space between rows */
      color: #334155 !important;
      /* Dark text for white background */
    }

    .custom-table thead th {
      border: none;
      color: #64748b;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 1px;
      padding: 15px 20px;
    }

    /* Hover Effect: White row turns into a 3D elevated row */
    .custom-table tbody tr {
      background: #f8fafc;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .custom-table tbody tr:hover {
      background: #ffffff;
      transform: scale(1.015) translateY(-5px);
      box-shadow: 0 10px 25px rgba(79, 172, 254, 0.2);
      z-index: 10;
      position: relative;
    }

    .custom-table td {
      padding: 20px !important;
      border-top: 1px solid #f1f5f9 !important;
      border-bottom: 1px solid #f1f5f9 !important;
      vertical-align: middle;
    }

    .custom-table td:first-child {
      border-left: 1px solid #f1f5f9 !important;
      border-radius: 15px 0 0 15px;
    }

    .custom-table td:last-child {
      border-right: 1px solid #f1f5f9 !important;
      border-radius: 0 15px 15px 0;
    }

    /* Action Buttons Styles */
    .btn-approve {
      background: rgba(34, 197, 94, 0.1);
      color: var(--success);
      border: 1px solid var(--success);
      border-radius: 10px;
      font-weight: 700;
      transition: 0.3s;
    }

    .btn-approve:hover {
      background: var(--success);
      color: white;
      box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3);
    }

    .btn-decline {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid var(--danger);
      border-radius: 10px;
      font-weight: 700;
      transition: 0.3s;
    }

    .btn-decline:hover {
      background: var(--danger);
      color: white;
      box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
    }

    .badge-status {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-glass py-3">
    <div class="container">
      <span class="navbar-brand fw-800 fs-4" style="color: var(--primary)">OSMS <span
          class="text-white">REVIEW</span></span>
      <div class="ms-auto">
        <a class="btn btn-outline-info btn-sm rounded-pill px-4 me-2" href="/html/ga-dashboard.html">Admin Console</a>
        <button class="btn btn-danger btn-sm rounded-pill px-4" id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-5">
      <div>
        <h2 class="fw-800 mb-0">Department Requests</h2>
        <p class="text-white-50">Authorized vetting of office supply orders</p>
      </div>
    </div>

    <div class="table-card">
      <div class="table-responsive">
        <table class="table custom-table">
          <thead>
            <tr>
              <th>Dept Identity</th>
              <th>Supplies Detail</th>
              <th>Status</th>
              <th class="text-center">Review Actions</th>
            </tr>
          </thead>
          <tbody id="requestsTable">
            <tr>
              <td><span class="fw-bold">IT-SOFTWARE (IT01)</span></td>
              <td>A4 Papers (50), Markers (10)</td>
              <td><span class="badge-status bg-warning text-dark">Pending</span></td>
              <td class="text-center">
                <button class="btn btn-approve btn-sm px-3 me-2">Approve</button>
                <button class="btn btn-decline btn-sm px-3">Decline</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/logout.js"></script>
  <script src="/js/ga-requests.js"></script>

</body>

</html>
