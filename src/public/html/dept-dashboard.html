<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Dept Dashboard - OSMS Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4facfe;
      --secondary: #00f2fe;
      --bg-dark: #070b14;
      --card-bg: rgba(30, 41, 59, 0.6);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      background-image:
        radial-gradient(circle at 50% -20%, rgba(79, 172, 254, 0.2) 0%, transparent 50%);
      min-height: 100vh;
      color: white;
      overflow-x: hidden;
    }

    /* Modern Glass Navbar */
    .navbar-glass {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1rem 0;
    }

    .nav-brand-3d {
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Dashboard 3D Action Cards */
    .action-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 25px;
      padding: 2.5rem;
      text-decoration: none !important;
      color: white !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.3);
      height: 100%;
      transform-style: preserve-3d;
    }

    .action-card:hover {
      transform: translateY(-15px) scale(1.05);
      border-color: var(--primary);
      box-shadow: 0 20px 40px rgba(79, 172, 254, 0.2);
    }

    .icon-box {
      width: 70px;
      height: 70px;
      background: rgba(79, 172, 254, 0.1);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      font-size: 2rem;
      box-shadow: inset 2px 2px 5px rgba(255, 255, 255, 0.1);
      transition: 0.3s;
    }

    .action-card:hover .icon-box {
      background: var(--primary);
      color: var(--bg-dark);
      transform: translateZ(30px);
    }

    /* Glow Effect */
    .glow-text {
      font-weight: 700;
      text-shadow: 0 0 15px rgba(79, 172, 254, 0.4);
    }

    .btn-logout-3d {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border-radius: 12px;
      padding: 8px 20px;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-logout-3d:hover {
      background: #ef4444;
      color: white;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-glass sticky-top">
    <div class="container">
      <span class="navbar-brand nav-brand-3d fs-3">OSMS <span style="color: var(--secondary)">CORE</span></span>
      <div class="ms-auto d-flex align-items-center">
        <span class="me-3 text-white-50 d-none d-md-inline small">Dept: <span
            class="text-white">IT-Software</span></span>
        <button class="btn btn-logout-3d" id="logoutBtn">Terminal Logout</button>
      </div>
    </div>
  </nav>



  <div class="container py-5">
    <div class="text-center mb-5">
      <h2 class="display-5 fw-800 brand-text">Department Dashboard</h2>
      <p class="text-white-50">Authorized Control Panel for Supply Requests</p>
    </div>

    <div class="row g-4 justify-content-center">

      <div class="col-md-4 col-sm-6">
        <a href="/html/dept-request.html" class="action-card" data-tilt>
          <div class="icon-box">➕</div>
          <h4 class="glow-text">New Request</h4>
          <p class="text-white-50 text-center small mt-2">Create a new supply ticket for your department</p>
        </a>
      </div>

      <div class="col-md-4 col-sm-6">
        <a href="/html/dept-requests.html" class="action-card" data-tilt>
          <div class="icon-box">📋</div>
          <h4 class="glow-text">My Records</h4>
          <p class="text-white-50 text-center small mt-2">Track status of pending and fulfilled requests</p>
        </a>
      </div>

      <div class="col-md-4 col-sm-6">
        <a href="/html/change-password.html" class="action-card" data-tilt>
          <div class="icon-box">🔑</div>
          <h4 class="glow-text">Security</h4>
          <p class="text-white-50 text-center small mt-2">Update your access credentials and password</p>
        </a>
      </div>

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/logout.js"></script>

  <script>
    VanillaTilt.init(document.querySelectorAll(".action-card"), {
      max: 15,
      speed: 400,
      glare: true,
      "max-glare": 0.2,
      scale: 1.05
    });
  </script>

</body>

</html>
